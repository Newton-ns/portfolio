version: "3.9"

services:
  # MongoDB
  mongo:
    image: mongo:6
    container_name: portfolio_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: portfolio

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: portfolio_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://mongo:27017/portfolio
      NODE_ENV: development
      PORT: 5000
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
      - /app/node_modules

  # Frontend (dev server via live-server)
  frontend:
    image: node:18-alpine
    container_name: portfolio_web
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    command: npx live-server --port=3000 --host=0.0.0.0

volumes:
  mongo_data:
